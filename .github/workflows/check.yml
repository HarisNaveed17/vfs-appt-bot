name: check-vfs

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: vfs-check
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --frozen --no-dev

      - name: Install Google Chrome
        run: |
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" \
            | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update -qq
          sudo apt-get install -y google-chrome-stable

      - name: Run check
        env:
          VFS_COUNTRY_CODE: ${{ secrets.VFS_COUNTRY_CODE }}
          VFS_MISSION_CODE: ${{ secrets.VFS_MISSION_CODE }}
          VFS_VAC_CODE: ${{ secrets.VFS_VAC_CODE }}
          VFS_VISA_CATEGORY: ${{ secrets.VFS_VISA_CATEGORY }}
          VFS_EMAIL: ${{ secrets.VFS_EMAIL }}
          VFS_PASSWORD: ${{ secrets.VFS_PASSWORD }}
          VFS_AUTHORIZE: ${{ secrets.VFS_AUTHORIZE }}
          VFS_CLIENT_SOURCE: ${{ secrets.VFS_CLIENT_SOURCE }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ALERT_EMAIL_TO: ${{ secrets.ALERT_EMAIL_TO }}
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_WHATSAPP_FROM: ${{ secrets.TWILIO_WHATSAPP_FROM }}
          ALERT_WHATSAPP_TO: ${{ secrets.ALERT_WHATSAPP_TO }}
          QUIET_HOURS_CET: ${{ vars.QUIET_HOURS_CET }}
        run: uv run python check.py

      - name: Persist state
        if: always()
        run: |
          if [[ -n "$(git status --porcelain state.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add state.json
            git commit -m "Update state.json [skip ci]"
            git push
          fi
